<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>KhidmatAI — Mobile Prototype</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: #080c14; }
  body { font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }
  ::-webkit-scrollbar { width: 0; height: 0; }
  button { font-family: 'Inter', sans-serif; }
  textarea { font-family: 'Inter', sans-serif; }

  /* ── Orb animations ────────────────────────── */
  @keyframes orbIdle {
    0%,100% { transform: scale(0.94); opacity: 0.88; }
    50%      { transform: scale(1.03); opacity: 1; }
  }
  @keyframes orbThink {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }
  @keyframes orbDone {
    0%   { transform: scale(1); }
    35%  { transform: scale(1.45); }
    65%  { transform: scale(0.82); }
    100% { transform: scale(1); }
  }

  /* ── Trace animations ──────────────────────── */
  @keyframes tracePulse {
    0%   { opacity: 0.35; transform: scale(0.88); }
    100% { opacity: 1;    transform: scale(1); }
  }
  @keyframes tracePopIn {
    0%   { transform: scale(0.2); opacity: 0; }
    55%  { transform: scale(1.18); }
    100% { transform: scale(1);    opacity: 1; }
  }

  /* ── Screen transitions ────────────────────── */
  @keyframes fadeSlideIn {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── Emergency chip pulse ──────────────────── */
  @keyframes emergencyPulse {
    0%,100% { box-shadow: 0 0 0 0   rgba(240,68,56,0.55); }
    50%     { box-shadow: 0 0 0 7px rgba(240,68,56,0); }
  }

  /* ── Success flash ─────────────────────────── */
  @keyframes successFlash {
    0%   { opacity: 0.92; }
    100% { opacity: 0; pointer-events: none; }
  }

  /* ── Confetti ──────────────────────────────── */
  @keyframes confettiDrop {
    0%   { transform: translateY(-10px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(140px) rotate(400deg); opacity: 0; }
  }

  /* ── Waveform bars ─────────────────────────── */
  @keyframes waveBar {
    0%,100% { height: 3px;  }
    50%     { height: 34px; }
  }

  /* ── Orb bobbing ───────────────────────────── */
  @keyframes bobbing {
    0%,100% { transform: translateY(0); }
    50%     { transform: translateY(-5px); }
  }

  /* ── Shake ─────────────────────────────────── */
  @keyframes shakeX {
    0%,100%  { transform: translateX(0); }
    20%,60%  { transform: translateX(-7px); }
    40%,80%  { transform: translateX(7px); }
  }

  /* ── Location sheet ────────────────────────── */
  @keyframes slideUp {
    from { transform: translateY(100%); }
    to   { transform: translateY(0); }
  }

  /* ── Push notification ─────────────────────── */
  @keyframes notifSlide {
    from { transform: translateY(-80px); opacity: 0; }
    to   { transform: translateY(0);     opacity: 1; }
  }
</style>

<!-- React + Babel -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!-- Tweak defaults (host-editable JSON block) -->
<script>
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "scenario": "success",
  "emergency": false,
  "speed": "normal"
}/*EDITMODE-END*/;
</script>
</head>
<body>
<div id="root"></div>

<!-- Load order matters: plain JS first, then Babel JSX -->
<script src="khidmat-theme.js"></script>
<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="khidmat-components.jsx"></script>
<script type="text/babel" src="khidmat-screens-1.jsx"></script>
<script type="text/babel" src="khidmat-screens-2.jsx"></script>
<script type="text/babel" src="khidmat-app.jsx"></script>
</body>
</html>
